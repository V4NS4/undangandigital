<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Undangan Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- POPUP PEMBUKA -->
    <div id="popup">
        <div class="container popup">
            <img src="bungaatas.png" class="bunga kiri-atas" />
            <img src="bungabawah.png" class="bunga kanan-bawah" />
            <div class="popup-content">
                <h1 class="fade-in-up">The Wedding Of</h1>
                <h2 class="pasangan fade-in-up">Siti S & Yogi N</h2>
                <div class="photo-wrapper">
                    <img src="wdpembuka.jpg" alt="Foto Mempelai" />
                </div>
                <p class="kepada-yth fade-in-up">Kepada Yth:</p>
                <p class="nama-tamu fade-in-up" id="guest-name">Nama Tamu</p>
                <button onclick="openInvitation()">Buka Undangan</button>
            </div>
        </div>
    </div>

    <!-- ISI UNDANGAN -->
    <div id="mainContent" class="hidden">
        <div class="container background">
            <div class="bingkai-kiri-atas"></div>
            <div class="bingkai-kanan-bawah"></div>
            <div class="wedding-text fade-in-up">
                <h2>The Wedding Of</h2>
                <h1>Siti <span>&</span> Yogi</h1>
                <p>We invite you to celebrate our wedding</p>
                <p class="date">Senin, 9 Juni 2025</p>
            </div>
        </div>

        <div class="container profil-mempelai">
            <h2 class="judul">Mempelai</h2>
            <div class="profil-wrapper">
                <div class="mempelai">
                    <img src="wanita.jpg" alt="Siti" class="foto">
                    <h3>Siti Suryani</h3>
                    <p>Putri dari Bpk. Somadin & Ibu. Omoy</p>
                </div>
                <div class="mempelai">
                    <img src="pria.jpg" alt="Yogi" class="foto">
                    <h3>Yogi Nurjaman</h3>
                    <p>Putra dari Bpk. Suryaman & Ibu. Nurliayah</p>
                </div>
            </div>
        </div>


        <audio id="bg-music" src="music.mp3" loop></audio>
    </div>




    <script src="script.js"></script>
</body>

</html>
